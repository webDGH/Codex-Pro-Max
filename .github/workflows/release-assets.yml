name: Release assets

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
            --title "codex-pro-max ${TAG#v}" \
            --notes "codex-pro-max ${TAG#v} release." \
            --latest
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

  windows-installer:
    runs-on: windows-latest
    needs: create-release
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success')
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-pro-max-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-pro-max-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-pro-max.exe dist/windows/app/
          Copy-Item target/release/codex-pro-max-manager.exe dist/windows/app/

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart("v", "V")
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexProMax.nsi
          Pop-Location

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/windows/*.exe

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: create-release
    if: always() && (github.event_name == 'release' || needs.create-release.result == 'success')
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-pro-max-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-pro-max-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/macos/*.dmg

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - windows-installer
      - macos-dmg
    if: always() && needs.windows-installer.result == 'success' && needs.macos-dmg.result == 'success'
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
